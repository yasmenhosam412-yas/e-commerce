name: boo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3
  get_it: ^9.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/font/

  fonts:
    - family: ABeeZee
      fonts:
        - asset: assets/font/abeezee.ttf

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  output_class: AppLocalizations
  output_dir: lib/generated

flutter_native_splash:
  image: "assets/icons/logo.png"
  color: "#ffffff"
  color_dark: "#000000"


flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/icons/logo.png
  adaptive_icon_background: "#000000"

