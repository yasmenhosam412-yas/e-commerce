name: boo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3
  get_it: ^9.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.0
  flutter_facebook_auth: ^6.0.0
  fluttertoast: ^9.0.0
  flutter_secure_storage: ^9.2.4
  carousel_slider: ^5.1.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  cloudinary: ^1.2.0
  lottie: ^3.3.2
  flutter_colorpicker: ^1.1.0
  equatable: ^2.0.8
  skeletonizer: ^2.1.2
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  uuid: ^4.5.3
  meta: ^1.17.0
  bloc: ^9.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/font/

  fonts:
    - family: ABeeZee
      fonts:
        - asset: assets/font/abeezee.ttf

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  output_class: AppLocalizations
  output_dir: lib/generated

flutter_native_splash:
  image: "assets/icons/logo2.png"
  color: "#ffffff"
  color_dark: "#000000"


flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/icons/logo.png
  adaptive_icon_background: "#000000"

